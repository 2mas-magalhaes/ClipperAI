<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="ClipAI">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFF">
        <animate attributeName="stop-color" values="#7C5CFF;#9B6CFF;#6E8BFF;#7C5CFF" dur="8s"
                 calcMode="spline" keyTimes="0;0.33;0.66;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#A855F7">
        <animate attributeName="stop-color" values="#A855F7;#7C5CFF;#9B6CFF;#A855F7" dur="8s"
                 calcMode="spline" keyTimes="0;0.33;0.66;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0" dur="4.5s"
                        calcMode="spline" keyTimes="0;1" keySplines="0.45 0 0.55 1" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="blob" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="textClip">
      <text x="653" y="190" text-anchor="middle"
            font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="600" letter-spacing="-2">ClipAI</text>
    </clipPath>
  </defs>

  <!-- Solid background -->
  <rect width="1200" height="360" fill="#0D1117"/>

  <!-- Drifting soft blobs for depth -->
  <g>
    <circle cx="320" cy="160" r="200" fill="url(#blob)">
      <animateTransform attributeName="transform" type="translate" values="0 0;60 -30;0 20;0 0" dur="14s"
                        calcMode="spline" keyTimes="0;0.33;0.66;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="220" r="230" fill="url(#blob2)">
      <animateTransform attributeName="transform" type="translate" values="0 0;-50 -20;30 30;0 0" dur="17s"
                        calcMode="spline" keyTimes="0;0.33;0.66;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Drifting particles travelling across -->
  <g fill="#9B6CFF">
    <circle cx="0" cy="80" r="3" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="120 0;1080 40" dur="13s"
                        calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.9;1" dur="13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="300" r="4" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="1100 0;120 -30" dur="16s"
                        calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.1;0.9;1" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="50" r="2.5" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="200 0;1000 220" dur="19s"
                        calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.6 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.9;1" dur="19s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Lightning bolt: floats, sways and glows -->
  <g transform="translate(332,92)">
    <g>
      <!-- float + sway combined -->
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0;0 8;0 0" dur="6s" additive="sum"
                        calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <g transform="translate(43,88)">
        <animateTransform attributeName="transform" type="rotate" values="-4;4;-4" dur="7s" additive="sum"
                          calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
        <path d="M 7 -88 L -35 8 L -3 8 L -19 88 L 35 -24 L 1 -24 Z"
              fill="url(#bolt)" stroke="#E9D5FF" stroke-width="1.5" stroke-linejoin="round">
          <animate attributeName="opacity" values="0;1" dur="1.2s" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1" fill="freeze"/>
          <animate attributeName="opacity" values="0.8;1;0.8" dur="4s" begin="1.2s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
        </path>
      </g>
    </g>
  </g>

  <!-- Wordmark with gentle bob -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0;0 5;0 0" dur="8s"
                      calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    <text x="653" y="190" text-anchor="middle"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="600" letter-spacing="-2">
      <tspan fill="#E6EDF3">Clip</tspan><tspan fill="url(#accent)">AI</tspan>
      <animate attributeName="opacity" values="0;1" dur="1.2s" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1" fill="freeze"/>
    </text>

    <!-- Shimmer sweep clipped to the wordmark shape -->
    <g clip-path="url(#textClip)">
      <rect width="1200" height="360" fill="url(#shimmer)" opacity="0.6"/>
    </g>
  </g>

  <!-- Animated underline sweep -->
  <line x1="483" y1="224" x2="823" y2="224" stroke="#21262D" stroke-width="4" stroke-linecap="round"/>
  <line x1="483" y1="224" x2="823" y2="224" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="340" stroke-dashoffset="340">
    <animate attributeName="stroke-dashoffset" values="340;0;0;340" keyTimes="0;0.4;0.7;1" dur="6s" begin="0.8s"
             calcMode="spline" keySplines="0.65 0 0.35 1;0 0 1 1;0.65 0 0.35 1" repeatCount="indefinite"/>
  </line>

  <!-- Animated equalizer bars (audio/video motion) -->
  <g transform="translate(653,250)" fill="url(#accent)">
    <rect x="-30" y="-7" width="6" height="14" rx="3">
      <animate attributeName="height" values="8;26;8" dur="1.1s" begin="0s"   calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-4;-13;-4" dur="1.1s" begin="0s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </rect>
    <rect x="-16" y="-7" width="6" height="14" rx="3">
      <animate attributeName="height" values="20;8;20" dur="0.9s" begin="0.2s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-10;-4;-10" dur="0.9s" begin="0.2s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </rect>
    <rect x="-2" y="-7" width="6" height="14" rx="3">
      <animate attributeName="height" values="10;30;10" dur="1.3s" begin="0.1s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-5;-15;-5" dur="1.3s" begin="0.1s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </rect>
    <rect x="12" y="-7" width="6" height="14" rx="3">
      <animate attributeName="height" values="24;10;24" dur="1.0s" begin="0.3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-12;-5;-12" dur="1.0s" begin="0.3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </rect>
    <rect x="26" y="-7" width="6" height="14" rx="3">
      <animate attributeName="height" values="8;22;8" dur="1.2s" begin="0.15s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="y"      values="-4;-11;-4" dur="1.2s" begin="0.15s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Tagline -->
  <text x="653" y="306" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#8B949E" letter-spacing="4">
    LOCAL YOUTUBE-TO-SHORTS PIPELINE
    <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
  </text>
</svg>
