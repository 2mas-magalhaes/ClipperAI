<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="ClipAI">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFF">
        <animate attributeName="stop-color" values="#7C5CFF;#9B6CFF;#6E8BFF;#7C5CFF" dur="8s"
                 calcMode="spline" keyTimes="0;0.33;0.66;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#A855F7">
        <animate attributeName="stop-color" values="#A855F7;#7C5CFF;#9B6CFF;#A855F7" dur="8s"
                 calcMode="spline" keyTimes="0;0.33;0.66;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>

    <!-- Moving shimmer used to sweep across the wordmark -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0" dur="4.5s"
                        calcMode="spline" keyTimes="0;1" keySplines="0.45 0 0.55 1" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="textClip">
      <text x="653" y="190" text-anchor="middle"
            font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="600" letter-spacing="-2">ClipAI</text>
    </clipPath>
  </defs>

  <!-- Solid background -->
  <rect width="1200" height="360" fill="#0D1117"/>

  <!-- Floating particles (smooth easing) -->
  <g fill="#7C5CFF">
    <circle cx="220" cy="90" r="3" opacity="0.5">
      <animate attributeName="cy" values="90;70;90" dur="6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="110" r="4" opacity="0.4">
      <animate attributeName="cy" values="110;88;110" dur="7.5s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.6;0.15" dur="7.5s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
    <circle cx="330" cy="300" r="3" opacity="0.4">
      <animate attributeName="cy" values="300;282;300" dur="8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="290" r="3" opacity="0.5">
      <animate attributeName="cy" values="290;272;290" dur="6.5s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="6.5s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Lightning bolt (logo mark) with smooth breathing glow -->
  <g transform="translate(332,92)">
    <path d="M 50 0 L 8 96 L 40 96 L 24 176 L 78 64 L 44 64 Z"
          fill="url(#bolt)" stroke="#E9D5FF" stroke-width="1.5" stroke-linejoin="round">
      <animate attributeName="opacity" values="0;1" dur="1.2s" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1" fill="freeze"/>
      <animate attributeName="opacity" values="0.78;1;0.78" dur="4s" begin="1.2s"
               calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Wordmark -->
  <text x="653" y="190" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="120" font-weight="600" letter-spacing="-2">
    <tspan fill="#E6EDF3">Clip</tspan><tspan fill="url(#accent)">AI</tspan>
    <animate attributeName="opacity" values="0;1" dur="1.2s" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1" fill="freeze"/>
  </text>

  <!-- Shimmer sweep clipped to the wordmark shape -->
  <g clip-path="url(#textClip)">
    <rect width="1200" height="360" fill="url(#shimmer)" opacity="0.6"/>
  </g>

  <!-- Animated underline sweep -->
  <line x1="483" y1="224" x2="823" y2="224" stroke="#21262D" stroke-width="4" stroke-linecap="round"/>
  <line x1="483" y1="224" x2="823" y2="224" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="340" stroke-dashoffset="340">
    <animate attributeName="stroke-dashoffset" values="340;0;0;340" keyTimes="0;0.4;0.7;1" dur="6s" begin="0.8s"
             calcMode="spline" keySplines="0.65 0 0.35 1;0 0 1 1;0.65 0 0.35 1" repeatCount="indefinite"/>
  </line>

  <!-- Breathing pipeline dots (smooth) -->
  <g transform="translate(593,250)">
    <circle cx="0"  cy="0" r="4" fill="#7C5CFF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0s"   calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="0" r="4" fill="#8A66FF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.4s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="0" r="4" fill="#9B6CFF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="0" r="4" fill="#A855F7">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.2s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Tagline -->
  <text x="653" y="306" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#8B949E" letter-spacing="4">
    LOCAL YOUTUBE-TO-SHORTS PIPELINE
    <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
  </text>
</svg>
