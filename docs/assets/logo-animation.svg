<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="ClipAI">
  <defs>
    <!-- Brand gradients -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#EC4899;#06B6D4;#7C3AED" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#EC4899">
        <animate attributeName="stop-color" values="#EC4899;#06B6D4;#7C3AED;#EC4899" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06B6D4">
        <animate attributeName="stop-color" values="#06B6D4;#7C3AED;#EC4899;#06B6D4" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#131A30"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="400" rx="28" fill="none" stroke="url(#brand)" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Ambient glow -->
  <circle cx="300" cy="200" r="240" fill="url(#glow)">
    <animate attributeName="cx" values="300;360;300" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="r" values="240;270;240" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Sliding film strip -->
  <g opacity="0.9">
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="2400" height="64" fill="#0E1428" stroke="url(#brand)" stroke-width="1.5" stroke-opacity="0.6">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-200 0" dur="3s" repeatCount="indefinite"/>
      </rect>
      <g fill="url(#brand)" opacity="0.85">
        <rect x="14"  y="22" width="20" height="20" rx="4"/>
        <rect x="64"  y="22" width="20" height="20" rx="4"/>
        <rect x="114" y="22" width="20" height="20" rx="4"/>
        <rect x="164" y="22" width="20" height="20" rx="4"/>
        <rect x="214" y="22" width="20" height="20" rx="4"/>
        <rect x="264" y="22" width="20" height="20" rx="4"/>
        <rect x="314" y="22" width="20" height="20" rx="4"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-200 0" dur="3s" repeatCount="indefinite"/>
      </g>
    </g>
    <g transform="translate(0,296)">
      <rect x="0" y="0" width="2400" height="64" fill="#0E1428" stroke="url(#brand)" stroke-width="1.5" stroke-opacity="0.6">
        <animateTransform attributeName="transform" type="translate" from="-200 0" to="0 0" dur="3.4s" repeatCount="indefinite"/>
      </rect>
      <g fill="url(#brand)" opacity="0.85">
        <rect x="14"  y="22" width="20" height="20" rx="4"/>
        <rect x="64"  y="22" width="20" height="20" rx="4"/>
        <rect x="114" y="22" width="20" height="20" rx="4"/>
        <rect x="164" y="22" width="20" height="20" rx="4"/>
        <rect x="214" y="22" width="20" height="20" rx="4"/>
        <rect x="264" y="22" width="20" height="20" rx="4"/>
        <rect x="314" y="22" width="20" height="20" rx="4"/>
        <animateTransform attributeName="transform" type="translate" from="-200 0" to="0 0" dur="3.4s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <!-- Play button emblem -->
  <g transform="translate(210,200)" filter="url(#soft)">
    <circle r="74" fill="#0E1428" stroke="url(#brand)" stroke-width="4"/>
    <circle r="74" fill="none" stroke="url(#brand)" stroke-width="4" stroke-dasharray="60 405" stroke-linecap="round" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="86" fill="none" stroke="url(#brand)" stroke-width="2" opacity="0.4">
      <animate attributeName="r" values="80;96;80" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <path d="M -22 -30 L 38 0 L -22 30 Z" fill="url(#brand)">
      <animateTransform attributeName="transform" type="scale" values="1;1.12;1" dur="1.6s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <!-- Wordmark -->
  <g transform="translate(360,180)">
    <text x="0" y="0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="116" font-weight="800" letter-spacing="-2">
      <tspan fill="#F8FAFC">Clip</tspan><tspan fill="url(#brand)">AI</tspan>
    </text>

    <!-- Animated subtitle / caption bars -->
    <g transform="translate(4,52)">
      <rect x="0"   y="0" height="16" rx="8" fill="url(#brand)" opacity="0.85">
        <animate attributeName="width" values="60;260;120;200;60" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="0"   y="30" height="16" rx="8" fill="#334155">
        <animate attributeName="width" values="180;90;220;130;180" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- AI sparkle -->
    <g transform="translate(470,-78)">
      <path d="M 0 -18 L 5 -5 L 18 0 L 5 5 L 0 18 L -5 5 L -18 0 L -5 -5 Z" fill="url(#brand)">
        <animateTransform attributeName="transform" type="scale" values="0.7;1.2;0.7" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(520,10)">
      <path d="M 0 -10 L 3 -3 L 10 0 L 3 3 L 0 10 L -3 3 L -10 0 L -3 -3 Z" fill="#06B6D4">
        <animateTransform attributeName="transform" type="scale" values="1;0.5;1" dur="2.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.4;1" dur="2.6s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Tagline -->
  <text x="364" y="300" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#94A3B8" letter-spacing="1">
    YouTube  →  Whisper  →  Ollama  →  Vertical Shorts
    <animate attributeName="opacity" values="0.55;1;0.55" dur="5s" repeatCount="indefinite"/>
  </text>
</svg>
